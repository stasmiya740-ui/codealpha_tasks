<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do List App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header class="app-header">
      <div>
        <p class="eyebrow">Task Manager</p>
        <h1>📝 To-Do List</h1>
      </div>
      <button id="themeToggle" class="icon-btn" aria-label="Toggle dark mode">🌙</button>
    </header>

    <section class="panel">
      <div class="input-section">
        <input type="text" id="taskInput" placeholder="Add a new task" autocomplete="off">
        <select id="categorySelect">
          <option value="Personal">Personal</option>
          <option value="Work">Work</option>
          <option value="Study">Study</option>
          <option value="Shopping">Shopping</option>
        </select>
        <button id="addBtn" class="primary-btn">Add</button>
      </div>

      <div class="search-section">
        <input type="text" id="searchInput" placeholder="Search tasks..." autocomplete="off">
      </div>

      <div class="toolbar">
        <div class="filter-group">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="completed">Completed</button>
          <button class="filter-btn" data-filter="pending">Pending</button>
        </div>
        <div class="task-counter">0 tasks</div>
      </div>

      <div class="progress-section">
        <div class="progress-bar">
          <div class="progress-fill"></div>
        </div>
        <p class="progress-text">0 of 0 tasks completed</p>
      </div>

      <div class="progress-section">
        <div class="progress-bar">
          <div class="progress-fill"></div>
        </div>
        <p class="progress-text">0 of 0 tasks completed</p>
      </div>

      <ul id="taskList" class="task-list"></ul>
      <div id="emptyState" class="empty-state" aria-hidden="true">
        <p>No tasks yet. Add your first task!</p>
      </div>
      <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
